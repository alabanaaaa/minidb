version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minidb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minidb?sslmode=disable
      HTTP_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      LOG_LEVEL: debug
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
