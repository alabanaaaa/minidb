<!DOCTYPE html>
<html lang="en" class="minidb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Mini-Database{{end}}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0b;
            --bg-elevated: #111113;
            --bg-card: #161618;
            --bg-hover: #1c1c1f;
            --border: #222225;
            --border-light: #2a2a2e;
            --text: #e4e4e7;
            --text-muted: #71717a;
            --text-dim: #52525b;
            --accent: #a78bfa;
            --accent-dim: #7c3aed;
            --accent-glow: rgba(167, 139, 250, 0.15);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.1);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.1);
            --amber: #fbbf24;
            --amber-dim: rgba(251, 191, 36, 0.1);
            --radius: 10px;
            --radius-lg: 14px;
            --font: 'Inter', -apple-system, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        html { font-size: 15px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Layout */
        .app { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: var(--bg-elevated);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 50;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .sidebar-brand span {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: block;
            margin-top: 2px;
        }

        .sidebar-nav { flex: 1; padding: 16px 12px; }

        .nav-section {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            padding: 8px 8px 6px;
            margin-top: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 400;
            transition: all 0.15s ease;
            margin-bottom: 2px;
        }

        .nav-link:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 500;
        }

        .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-dim);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .user-details { flex: 1; min-width: 0; }
        .user-name { font-size: 0.8rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.65rem; color: var(--text-dim); text-transform: capitalize; }

        .main { flex: 1; margin-left: 240px; }

        .topbar {
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            background: var(--bg-elevated);
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .topbar-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .topbar-actions { display: flex; align-items: center; gap: 12px; }

        .content { padding: 28px; }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* Stat cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: border-color 0.2s ease;
        }

        .stat-card:hover { border-color: var(--border-light); }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .stat-change {
            font-size: 0.75rem;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        .stat-change.up { color: var(--green); }
        .stat-change.down { color: var(--red); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: var(--font);
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .btn-danger {
            background: var(--red-dim);
            color: var(--red);
        }

        .btn-danger:hover {
            background: var(--red);
            color: var(--bg);
        }

        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

        /* Forms */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: var(--font);
            transition: border-color 0.15s ease;
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder { color: var(--text-dim); }

        /* Tables */
        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding: 10px 14px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-hover); }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .badge-green { background: var(--green-dim); color: var(--green); }
        .badge-red { background: var(--red-dim); color: var(--red); }
        .badge-amber { background: var(--amber-dim); color: var(--amber); }
        .badge-purple { background: var(--accent-glow); color: var(--accent); }

        /* Grid layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        /* POS specific */
        .pos-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            height: calc(100vh - 112px);
        }

        .pos-products {
            overflow-y: auto;
            padding-right: 8px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .product-card:hover {
            border-color: var(--accent-dim);
            transform: translateY(-1px);
        }

        .product-card.out-of-stock {
            opacity: 0.4;
            pointer-events: none;
        }

        .product-card-name {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .product-card-price {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .product-card-stock {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .pos-cart {
            background: var(--bg-elevated);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .cart-items { flex: 1; overflow-y: auto; padding: 16px; }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 0.85rem; font-weight: 500; }
        .cart-item-price { font-size: 0.75rem; color: var(--text-muted); }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .qty-btn:hover { border-color: var(--accent-dim); }

        .cart-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cart-total-label { font-size: 0.85rem; color: var(--text-muted); }
        .cart-total-value { font-size: 1.25rem; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

        /* Login page */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, var(--accent-glow) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .login-card {
            position: relative;
            width: 100%;
            max-width: 380px;
            padding: 40px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 20px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .login-logo p {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .login-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent-dim);
            color: var(--accent);
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.15s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 16px;
        }

        .alert-error {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .alert-success {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        /* Ghost mode */
        .anomaly-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }

        .anomaly-card.critical { border-left: 3px solid var(--red); }
        .anomaly-card.high { border-left: 3px solid var(--amber); }
        .anomaly-card.medium { border-left: 3px solid var(--accent); }
        .anomaly-card.low { border-left: 3px solid var(--green); }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 9px 12px 9px 36px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: var(--font);
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-box svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-dim);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.2s ease; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .pos-layout { grid-template-columns: 1fr; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

        /* HTMX indicators */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.2s ease; }

        /* Mono for numbers */
        .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    {{block "body" .}}{{end}}
</body>
</html>
