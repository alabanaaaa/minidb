<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mini-Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0b;
            --bg-elevated: #111113;
            --border: #222225;
            --text: #e4e4e7;
            --text-muted: #71717a;
            --text-dim: #52525b;
            --accent: #a78bfa;
            --accent-dim: #7c3aed;
            --accent-glow: rgba(167, 139, 250, 0.15);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.1);
            --font: 'Inter', -apple-system, sans-serif;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, var(--accent-glow) 0%, transparent 60%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .login-card {
            position: relative;
            width: 100%;
            max-width: 360px;
            padding: 40px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 20px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.03em;
        }
        .login-logo p {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s ease;
        }
        .form-input:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-input::placeholder { color: var(--text-dim); }
        .login-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent-dim);
            color: var(--accent);
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.15s ease;
            margin-top: 8px;
        }
        .login-btn:hover { background: var(--accent); color: var(--bg); }
        .alert-error {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 16px;
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248,113,113,0.2);
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <h1>Mini-Database</h1>
            <p>Retail Financial Integrity</p>
        </div>

        {{if .Error}}
        <div class="alert-error">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="you@shop.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button class="login-btn" type="submit">Sign in</button>
        </form>

        <div class="login-footer">
            New here? <a href="/signup" style="color:var(--accent);text-decoration:none">Create your shop</a>
        </div>
    </div>
</body>
</html>
