{{define "title"}}Workers — Mini-Database{{end}}
{{define "topbar-actions"}}
<button class="btn btn-primary btn-sm" onclick="document.getElementById('addModal').style.display='flex'">+ Add Worker</button>
{{end}}
{{define "content"}}
<div class="card">
    <div class="card-body">
        <table>
            <thead><tr><th>Name</th><th>PIN Set</th><th>Status</th><th>Created</th></tr></thead>
            <tbody>
                {{range .Workers}}
                <tr>
                    <td style="font-weight:500">{{.Name}}</td>
                    <td>{{if .HasPIN}}<span class="badge badge-green">Yes</span>{{else}}<span class="badge badge-red">No</span>{{end}}</td>
                    <td>{{if .Active}}<span class="badge badge-green">Active</span>{{else}}<span class="badge badge-red">Inactive</span>{{end}}</td>
                    <td style="color:var(--text-secondary)">{{.CreatedAt}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
<div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal">
        <h3>Add Worker</h3>
        <form method="POST" action="/workers/add">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input class="form-input" type="text" name="name" required placeholder="Worker name">
            </div>
            <div class="form-group">
                <label class="form-label">PIN (4 digits, optional)</label>
                <input class="form-input" type="text" name="pin" maxlength="4" pattern="[0-9]{4}" placeholder="1234">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="document.getElementById('addModal').style.display='none'">Cancel</button>
                <button type="submit" class="btn btn-primary">Add Worker</button>
            </div>
        </form>
    </div>
</div>
{{end}}
