<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Mini-Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0b; --bg-elevated: #111113; --border: #222225;
            --text: #e4e4e7; --text-muted: #71717a; --text-dim: #52525b;
            --accent: #a78bfa; --accent-dim: #7c3aed; --accent-glow: rgba(167, 139, 250, 0.15);
            --red: #f87171; --red-dim: rgba(248, 113, 113, 0.1); --green: #34d399; --green-dim: rgba(52, 211, 153, 0.1);
            --font: 'Inter', -apple-system, sans-serif;
        }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, var(--accent-glow) 0%, transparent 60%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        .signup-card {
            position: relative; width: 100%; max-width: 400px; padding: 36px 40px;
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; margin: 20px;
        }
        .signup-logo { text-align: center; margin-bottom: 28px; }
        .signup-logo h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.03em; }
        .signup-logo p { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
        .form-input {
            width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.82rem; font-family: var(--font);
            outline: none; transition: border-color 0.15s ease;
        }
        .form-input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 3px var(--accent-glow); }
        .form-input::placeholder { color: var(--text-dim); }
        .signup-btn {
            width: 100%; padding: 11px; background: var(--accent-dim); color: var(--accent);
            border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
            font-family: var(--font); cursor: pointer; transition: all 0.15s ease; margin-top: 6px;
        }
        .signup-btn:hover { background: var(--accent); color: var(--bg); }
        .alert-error {
            padding: 10px 14px; border-radius: 8px; font-size: 0.78rem; margin-bottom: 14px;
            background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2);
        }
        .alert-success {
            padding: 10px 14px; border-radius: 8px; font-size: 0.78rem; margin-bottom: 14px;
            background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,0.2);
        }
        .signup-footer { text-align: center; margin-top: 20px; font-size: 0.75rem; color: var(--text-dim); }
        .signup-footer a { color: var(--accent); text-decoration: none; }
        .signup-footer a:hover { text-decoration: underline; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider span { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
        .section-label {
            font-size: 0.65rem; font-weight: 500; color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 0.08em; margin-bottom: 10px; margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="signup-logo">
            <h1>Create Your Shop</h1>
            <p>Start tracking sales with financial integrity</p>
        </div>

        {{if .Error}}
        <div class="alert-error">{{.Error}}</div>
        {{end}}
        {{if .Success}}
        <div class="alert-success">{{.Success}}</div>
        {{end}}

        <form method="POST" action="/signup">
            <div class="section-label">Your Shop</div>
            <div class="form-group">
                <label class="form-label" for="shop_name">Shop Name</label>
                <input class="form-input" type="text" id="shop_name" name="shop_name" placeholder="e.g. Mama Mboga Store" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="currency">Currency</label>
                <select class="form-input" id="currency" name="currency">
                    <option value="KES" selected>KES — Kenyan Shilling</option>
                    <option value="USD">USD — US Dollar</option>
                    <option value="TZS">TZS — Tanzanian Shilling</option>
                    <option value="UGX">UGX — Ugandan Shilling</option>
                </select>
            </div>

            <div class="divider"><span>Owner Account</span></div>

            <div class="form-group">
                <label class="form-label" for="name">Your Name</label>
                <input class="form-input" type="text" id="name" name="name" placeholder="e.g. Jane Wanjiku" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
            </div>

            <button class="signup-btn" type="submit">Create Shop & Account</button>
        </form>

        <div class="signup-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
